{% extends "base.html" %}

{% block title %}工单列表{% endblock %}

{% block content %}
<div class="page-head">
  <div>
    <h1>工单列表</h1>
    <p>按状态标签、归档状态或我的待办筛选当前工单。</p>
  </div>
  {% if current_member.is_admin %}
    <a class="primary" href="{% url 'order_create' %}">新建工单</a>
  {% endif %}
</div>

<form method="get" class="filters">
  <label>状态
    <select name="status">
      <option value="">全部状态标签</option>
      {% for status in statuses %}
        <option value="{{ status.id }}" {% if status_id == status.id|stringformat:"s" %}selected{% endif %}>{{ status.name }}</option>
      {% endfor %}
    </select>
  </label>
  <label class="inline-check">
    <input type="checkbox" name="archived" value="1" {% if show_archived %}checked{% endif %}>
    显示归档
  </label>
  <label class="inline-check">
    <input type="checkbox" name="mine" value="1" {% if mine %}checked{% endif %}>
    只看我的未完成待办
  </label>
  <button type="submit">筛选</button>
</form>

<div class="panel">
  {% include "includes/order_table.html" with orders=orders %}
</div>
{% endblock %}
