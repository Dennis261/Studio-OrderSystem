{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<section class="login-shell">
  <div class="login-panel">
    {% include "components/page_header.html" with title="进入工单协作" subtitle="选择姓名并输入口令。" only %}
    <form method="post" class="form-stack">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label>{{ form.member.label }}{{ form.member }}</label>
      <label>{{ form.pin.label }}{{ form.pin }}</label>
      <button class="primary" type="submit">进入系统</button>
    </form>
  </div>
</section>
{% endblock %}
